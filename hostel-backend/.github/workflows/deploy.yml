name: Deploy Backend Infrastructure

on:
    push:
        branches:
            - main
        paths:
            - "src/**"
            - "pom.xml"
            - "infrastructure/**"
            - "Dockerfile.prod"

permissions:
    id-token: write # Required for requesting the AWS JWT via OIDC
    contents: read # Required to checkout code

jobs:
    deploy:
        name: Build & Deploy to AWS Fargate
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: "maven"

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                audience: sts.amazonaws.com
                aws-region: ${{ vars.AWS_REGION }}
                role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Hostel-Github-Actions

            - name: Install CDK and Infrastructure Dependencies
              run: |
                  npm install -g aws-cdk
                  cd infrastructure
                  npm install

            - name: Deploy Infrastructure
              run: |
                  cd infrastructure
                  cdk deploy --require-approval never
